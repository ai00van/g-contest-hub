name: Update poster opportunities

on:
  schedule:
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch latest Sotong posters
        run: node scripts/fetch-sotong-posters.mjs data/opportunities.json
        env:
          SOTONG_PAGES: "5"
          SOTONG_PAGE_SIZE: "20"
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          if git diff --cached --quiet; then
            echo "No opportunity changes"
          else
            git commit -m "data: update poster opportunities"
            git push
          fi
